---
# ── Relationship Worker Deployment ────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cin-relationship-worker
  namespace: cin-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cin-relationship-worker
  template:
    metadata:
      labels:
        app: cin-relationship-worker
    spec:
      containers:
        - name: relationship-worker
          image: cin-platform/worker:latest
          command: ["python", "-m", "src.workers.relationship_worker"]
          envFrom:
