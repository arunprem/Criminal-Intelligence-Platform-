          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

---
# ── Historical Batch Job ───────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: cin-historical-batch
  namespace: cin-platform
spec:
  parallelism: 4
  completions: 4
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: batch-processor
          image: cin-platform/worker:latest
          command:
            - python
            - scripts/run_historical_batch.py
            - "--parallel"
          envFrom:
            - configMapRef:
                name: cin-config
            - secretRef:
                name: cin-secrets
          resources:
            requests:
              cpu: "1000m"
              memory: "4Gi"
            limits:
              cpu: "2000m"
              memory: "8Gi"
