---
# ── Normalization Worker Deployment ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cin-normalization-worker
  namespace: cin-platform
spec:
  replicas: 4
  selector:
    matchLabels:
      app: cin-normalization-worker
  template:
    metadata:
      labels:
        app: cin-normalization-worker
    spec:
      containers:
        - name: normalization-worker
          image: cin-platform/worker:latest
          command: ["python", "-m", "src.workers.normalization_worker"]
          envFrom:
            - configMapRef:
                name: cin-config
            - secretRef:
                name: cin-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

