networks:
  cin-network:
    driver: bridge

volumes:
  es-data-01:
  es-data-02:
  es-data-03:
  kafka-data:

services:
  # ── Elasticsearch Cluster ───────────────────────────────────────────────────
  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: cin-es01
    environment:
      - node.name=es01
      - cluster.name=cin-cluster
      - discovery.seed_hosts=es02,es03
      - cluster.initial_master_nodes=es01,es02,es03
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data-01:/usr/share/elasticsearch/data
    ports:
      - "9201:9200"    # host:9201 → avoid conflict with existing ES on :9200
    networks:
      - cin-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  es02:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: cin-es02
    environment:
      - node.name=es02
      - cluster.name=cin-cluster
      - discovery.seed_hosts=es01,es03
      - cluster.initial_master_nodes=es01,es02,es03
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data-02:/usr/share/elasticsearch/data
    networks:
      - cin-network

  es03:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: cin-es03
    environment:
      - node.name=es03
      - cluster.name=cin-cluster
      - discovery.seed_hosts=es01,es02
      - cluster.initial_master_nodes=es01,es02,es03
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data-03:/usr/share/elasticsearch/data
    networks:
      - cin-network

  # ── Kibana ──────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: cin-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://es01:9200
    depends_on:
      es01:
        condition: service_healthy
    networks:
      - cin-network

  # ── Kafka + Zookeeper ───────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: cin-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - cin-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: cin-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 12
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - cin-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: cin-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - cin-network

  # ── FastAPI Service ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: cin-api
    ports:
      - "8000:8000"
    environment:
      - ES_HOSTS=http://es01:9200
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    env_file:
      - .env
    depends_on:
      es01:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - cin-network
    restart: unless-stopped

  # ── Normalization Worker ────────────────────────────────────────────────────
  normalization-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: cin-normalization-worker
    command: ["python", "-m", "src.workers.normalization_worker"]
    environment:
      - ES_HOSTS=http://es01:9200
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - ENVIRONMENT=development
    env_file:
      - .env
    depends_on:
      es01:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - cin-network
    restart: unless-stopped

  # ── Resolution Worker ───────────────────────────────────────────────────────
  resolution-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: cin-resolution-worker
    command: ["python", "-m", "src.workers.resolution_worker"]
    environment:
      - ES_HOSTS=http://es01:9200
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - ENVIRONMENT=development
    env_file:
      - .env
    depends_on:
      es01:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - cin-network
    restart: unless-stopped

  # ── Relationship Worker ─────────────────────────────────────────────────────
  relationship-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: cin-relationship-worker
    command: ["python", "-m", "src.workers.relationship_worker"]
    environment:
      - ES_HOSTS=http://es01:9200
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - ENVIRONMENT=development
    env_file:
      - .env
    depends_on:
      es01:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - cin-network
    restart: unless-stopped
